<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECC | Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js" defer></script>
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; margin: 0; padding: 20px; box-sizing: border-box; }
        .login-container { max-width: 480px; width: 100%; position: relative; z-index: 10; animation: fadeUp 0.8s ease forwards; text-align: center; }
        .error-msg { background: rgba(255,50,50,0.1); border: 1px solid rgba(255,50,50,0.3); color: #ff5555; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-weight: 500; font-size: 0.9rem; }
        .success-msg { background: rgba(35,213,213,0.1); border: 1px solid rgba(35,213,213,0.3); color: #23d5d5; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-weight: 500; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="ambient-glow"></div>

    <div class="login-container">
        <header class="hero-header" style="margin-bottom: 30px; animation: none; transform: none; opacity: 1;">
            <h1 class="logo-title" style="font-size: 3rem;">RECC</h1>
            <p class="hero-subtitle" style="font-size: 1rem;">Secure Password Reset</p>
        </header>

        <div class="glass-panel">
            {% if error %}
                <div class="error-msg">{{ error }}</div>
                <a href="/login" class="primary-btn" style="text-decoration: none; display: inline-block;">Return to Login</a>
            {% elif success %}
                <div class="success-msg">{{ success }}</div>
                <a href="/login" class="primary-btn" style="text-decoration: none; display: inline-block;">Go to Login</a>
            {% else %}
                <p style="color: var(--text-muted); margin-bottom: 20px; font-size: 0.95rem;">Please choose a strong, new password.</p>
                <form method="POST">
                    <div class="input-group">
                        <input type="password" name="password" placeholder="New Password" required minlength="6">
                    </div>
                    <button type="submit" class="primary-btn">Update Password</button>
                </form>
            {% endif %}
        </div>
    </div>

    <script>
        if(window.particlesJS) {
            particlesJS("particles-js", {
                "particles": {
                    "number": { "value": 40, "density": { "enable": true, "value_area": 800 } },
                    "color": { "value": "#23d5d5" },
                    "shape": { "type": "circle" },
                    "opacity": { "value": 0.3, "random": false },
                    "size": { "value": 2, "random": true },
                    "line_linked": { "enable": true, "distance": 150, "color": "#23d5d5", "opacity": 0.2, "width": 1 },
                    "move": { "enable": true, "speed": 1.5, "direction": "none", "random": true, "straight": false, "out_mode": "out", "bounce": false }
                },
                "interactivity": { "events": { "onhover": { "enable": false }, "onclick": { "enable": false } } },
                "retina_detect": true
            });
        }
    </script>
</body>
</html>
