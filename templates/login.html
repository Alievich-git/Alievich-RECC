<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECC | Authentication</title>
    
    <!-- Core SEO & Performance Meta -->
    <meta name="description" content="Secure Login for the RECC Dashboard. Automate your Meta Real Estate Campaigns instantly.">
    <meta name="author" content="Ali Alievich">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="RECC | Secure Authentication">
    <meta property="og:description" content="Access the RECC private pipeline to continuously automate your real estate backend flows.">
    <meta property="og:type" content="website">

    <!-- Preconnects for maximum network routing speed -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>

    <link rel="icon" type="image/png" href="/static/images/favicon-black.png" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" href="/static/images/favicon.png" media="(prefers-color-scheme: dark)">
    <link rel="shortcut icon" href="/static/images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js" defer></script>
    <style>
        body { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            overflow: hidden; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box; 
            flex-direction: column;
            background-color: var(--bg-dark);
        }
        #particles-js { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .ambient-glow { position: absolute; z-index: 0; }
        
        .login-container { 
            max-width: 480px; 
            width: 100%; 
            position: relative; 
            z-index: 10; 
            animation: fadeUp 0.8s ease forwards;
            animation-delay: 0.2s;
            opacity: 0;
        }
        
        .auth-panel { text-align: center; }
        .auth-panel h2 { justify-content: center; margin-bottom: 30px; border-bottom: none; font-size: 1.8rem; letter-spacing: 2px;}
        .tabs { display: flex; margin-bottom: 25px; border-radius: 12px; background: rgba(0,0,0,0.3); padding: 5px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; color: var(--text-muted); font-weight: 600; transition: all 0.3s ease; }
        .tab-btn.active { background: rgba(35, 213, 213, 0.15); color: var(--primary); box-shadow: 0 0 10px rgba(35, 213, 213, 0.1); }
        .auth-form { display: none; }
        .auth-form.active { display: block; animation: slideDown 0.3s ease forwards; }
        .error-msg { background: rgba(255,50,50,0.1); border: 1px solid rgba(255,50,50,0.3); color: #ff5555; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-weight: 500; font-size: 0.9rem; }
        
        /* Custom Checkbox */
        .custom-checkbox { position: relative; padding-left: 30px; cursor: pointer; user-select: none; color: var(--text-muted); display: flex; align-items: center; font-size: 0.9rem; font-weight: 500; transition: color 0.3s ease; }
        .custom-checkbox input { position: absolute; opacity: 0; cursor: pointer; height: 0; width: 0; }
        .checkmark { position: absolute; left: 0; top: 50%; transform: translateY(-50%); height: 18px; width: 18px; background-color: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; transition: all 0.3s ease; }
        .custom-checkbox:hover .checkmark { border-color: rgba(35, 213, 213, 0.5); }
        .custom-checkbox input:checked ~ .checkmark { background-color: rgba(35, 213, 213, 0.2); border-color: var(--primary); box-shadow: 0 0 10px rgba(35, 213, 213, 0.2); }
        .checkmark:after { content: ""; position: absolute; display: none; }
        .custom-checkbox input:checked ~ .checkmark:after { display: block; }
        .custom-checkbox .checkmark:after { left: 5px; top: 1px; width: 5px; height: 10px; border: solid var(--primary); border-width: 0 2px 2px 0; transform: rotate(45deg); }
        .custom-checkbox input:checked ~ span.label-text { color: var(--primary); }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="ambient-glow"></div>

    <!-- Match the main dashboard hero header perfectly -->
    <header class="hero-header fade-up" style="position: relative; z-index: 10;">
        <a href="https://alievich.com" target="_blank" style="display: inline-block;">
            <img src="/static/images/alivich-logo.webp" alt="Alievich Brand Logo" class="top-brand-logo">
        </a>
        <h1 class="logo-title">RECC</h1>
        <p class="hero-subtitle">REAL ESTATE CAMPAIGN CREATOR</p>
        <p style="margin-top: 10px; font-size: 0.9rem; color: rgba(138, 159, 194, 0.7); font-family: 'General Sans', sans-serif;">Built by <a href="https://alievich.com" target="_blank" style="color: var(--primary); text-decoration: none; font-weight: 500;">Ali Alievich <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 2px;"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg></a></p>
    </header>

    <div class="login-container">
        <div class="glass-panel auth-panel">
            {% if error %}
                <div class="error-msg">{{ error }}</div>
            {% endif %}

            <div class="tabs">
                <div class="tab-btn active" onclick="switchTab('login')">Log In</div>
                <div class="tab-btn" onclick="switchTab('register')">Register</div>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form active" action="/login" method="POST">
                <div class="input-group">
                    <input type="email" name="email" placeholder="Email Address" required autocomplete="email">
                </div>
                <div class="input-group">
                    <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 0.9rem;">
                    <label class="custom-checkbox">
                        <input type="checkbox" name="remember">
                        <span class="checkmark"></span>
                        <span class="label-text" style="transition: color 0.3s ease;">Remember Me</span>
                    </label>
                    <a href="#" onclick="openForgotModal(); return false;" style="color: var(--primary); text-decoration: none;">Forgot Password?</a>
                </div>
                <button type="submit" class="primary-btn">Secure Login</button>
            </form>

            <!-- Registration Form -->
            <form id="registerForm" class="auth-form" action="/register" method="POST">
                <div class="input-group">
                    <input type="text" name="invite_code" placeholder="Exclusive Invite Code" required style="border-color: var(--primary); background: rgba(35, 213, 213, 0.05); color: var(--primary);">
                </div>
                <div class="input-group">
                    <input type="email" name="email" placeholder="Email Address" required autocomplete="email">
                </div>
                <div class="input-group">
                    <input type="password" name="password" placeholder="Choose a Password" required autocomplete="new-password">
                </div>
                <button type="submit" class="primary-btn" style="background: rgba(35, 213, 213, 0.2); border: 1px solid var(--primary); color: #fff;">Create Account</button>
            </form>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(5px);">
        <div class="glass-panel" style="max-width: 400px; width: 90%; text-align: center; position: relative;">
            <button onclick="closeForgotModal()" style="position: absolute; top: 15px; right: 20px; background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer;">&times;</button>
            <h2 style="font-size: 1.5rem; margin-bottom: 10px;">Reset Password</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px;">Enter your email to receive a secure reset link.</p>
            <div id="forgotMsg" style="margin-bottom: 15px; font-size: 0.9rem; font-weight: 500;"></div>
            <div class="input-group">
                <input type="email" id="forgotEmail" placeholder="Your Email Address" required>
            </div>
            <button id="forgotBtn" onclick="sendResetLink()" class="primary-btn">Send Reset Link</button>
        </div>
    </div>

    <script>
        function openForgotModal() {
            document.getElementById('forgotModal').style.display = 'flex';
            document.getElementById('forgotMsg').textContent = '';
            document.getElementById('forgotEmail').value = '';
        }
        function closeForgotModal() {
            document.getElementById('forgotModal').style.display = 'none';
        }
        function sendResetLink() {
            const email = document.getElementById('forgotEmail').value.trim();
            if (!email) return;
            const btn = document.getElementById('forgotBtn');
            const msg = document.getElementById('forgotMsg');
            btn.textContent = 'Sending...';
            btn.disabled = true;
            
            fetch('/forgot_password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            }).then(res => res.json()).then(data => {
                btn.textContent = 'Send Reset Link';
                btn.disabled = false;
                if (data.success) {
                    msg.style.color = '#23d5d5';
                    msg.textContent = 'If that email exists, a reset link has been sent.';
                } else {
                    msg.style.color = '#ff5555';
                    msg.textContent = data.message || 'Error sending link.';
                }
            }).catch(err => {
                btn.textContent = 'Send Reset Link';
                btn.disabled = false;
                msg.style.color = '#ff5555';
                msg.textContent = 'Network error.';
            });
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }

        if(window.particlesJS) {
            particlesJS("particles-js", {
                "particles": {
                    "number": { "value": 40, "density": { "enable": true, "value_area": 800 } },
                    "color": { "value": "#23d5d5" },
                    "shape": { "type": "circle" },
                    "opacity": { "value": 0.3, "random": false },
                    "size": { "value": 2, "random": true },
                    "line_linked": { "enable": true, "distance": 150, "color": "#23d5d5", "opacity": 0.2, "width": 1 },
                    "move": { "enable": true, "speed": 1.5, "direction": "none", "random": true, "straight": false, "out_mode": "out", "bounce": false }
                },
                "interactivity": { "events": { "onhover": { "enable": false }, "onclick": { "enable": false } } },
                "retina_detect": true
            });
        }
    </script>
</body>
</html>
